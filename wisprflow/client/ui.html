<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WisprFlow</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

#pill {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 48px;
    background: rgba(15, 15, 26, 0.92);
    border: 1px solid #2a2a3a;
    border-radius: 28px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    cursor: pointer;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.3s ease,
                box-shadow 0.3s ease;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    overflow: hidden;
}

#pill.active {
    width: 320px;
    height: 56px;
    border-color: #ef4444;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(239, 68, 68, 0.15);
}

#pill.processing {
    width: 320px;
    height: 56px;
    border-color: #6366f1;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(99, 102, 241, 0.15);
}

#pill.success {
    width: 320px;
    height: 56px;
    border-color: #22c55e;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(34, 197, 94, 0.15);
}

#pill.error {
    width: 320px;
    height: 56px;
    border-color: #ef4444;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5),
                0 0 16px rgba(239, 68, 68, 0.2);
}

/* Pulsing border animation for active state */
@keyframes pulse-border {
    0%, 100% { border-color: #ef4444; box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 20px rgba(239,68,68,0.15); }
    50% { border-color: #f87171; box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 28px rgba(239,68,68,0.3); }
}

#pill.active {
    animation: pulse-border 2s ease-in-out infinite;
}

/* --- Idle state --- */
#idle-content {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
}

.mic-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #6366f1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.mic-circle svg {
    width: 16px;
    height: 16px;
    fill: white;
}

.idle-label {
    font-size: 12px;
    font-weight: 600;
    color: #e2e8f0;
    flex: 1;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
    flex-shrink: 0;
    transition: background 0.3s ease;
}

.status-dot.connected {
    background: #22c55e;
}

/* --- Listening state --- */
#listening-content {
    display: none;
    align-items: center;
    width: 100%;
    height: 100%;
    gap: 8px;
}

.rec-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}

.rec-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ef4444;
    animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.rec-timer {
    font-size: 11px;
    color: #64748b;
    font-variant-numeric: tabular-nums;
    min-width: 22px;
}

#waveform-canvas {
    flex: 1;
    height: 100%;
}

/* --- Processing state --- */
#processing-content {
    display: none;
    align-items: center;
    justify-content: center;
    width: 100%;
}

.processing-text {
    font-size: 12px;
    font-weight: 600;
    color: #6366f1;
}

.processing-dots {
    display: inline-flex;
    gap: 4px;
    margin-left: 6px;
}

.processing-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #6366f1;
    animation: dot-pulse 1.4s ease-in-out infinite;
}

.processing-dots span:nth-child(2) { animation-delay: 0.2s; }
.processing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
}

/* --- Success state --- */
#success-content {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 2px;
}

.success-label {
    font-size: 11px;
    font-weight: 700;
    color: #22c55e;
    display: flex;
    align-items: center;
    gap: 6px;
}

.success-label svg {
    width: 14px;
    height: 14px;
    fill: #22c55e;
}

.success-preview {
    font-size: 10px;
    color: #64748b;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* --- Error state --- */
#error-content {
    display: none;
    align-items: center;
    justify-content: center;
    width: 100%;
}

.error-text {
    font-size: 11px;
    color: #ef4444;
    font-weight: 500;
}
</style>
</head>
<body>
<div id="pill" onclick="handleClick(event)">
    <!-- Idle -->
    <div id="idle-content">
        <div class="mic-circle">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
        <span class="idle-label">WisprFlow</span>
        <div class="status-dot" id="status-dot"></div>
    </div>

    <!-- Listening -->
    <div id="listening-content">
        <div class="rec-indicator">
            <div class="rec-dot"></div>
            <span class="rec-timer" id="rec-timer">0s</span>
        </div>
        <canvas id="waveform-canvas"></canvas>
    </div>

    <!-- Processing -->
    <div id="processing-content">
        <span class="processing-text">Transcribing</span>
        <div class="processing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Success -->
    <div id="success-content">
        <div class="success-label">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            Pasted!
        </div>
        <div class="success-preview" id="success-preview"></div>
    </div>

    <!-- Error -->
    <div id="error-content">
        <span class="error-text" id="error-text">No connection — check tunnel</span>
    </div>
</div>

<script>
// --- State Machine ---
let state = 'idle'; // idle | listening | processing | success | error
let audioLevelBuffer = new Array(40).fill(0);
let animFrameId = null;
let levelPollId = null;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;

const pill = document.getElementById('pill');
const idleContent = document.getElementById('idle-content');
const listeningContent = document.getElementById('listening-content');
const processingContent = document.getElementById('processing-content');
const successContent = document.getElementById('success-content');
const errorContent = document.getElementById('error-content');
const statusDot = document.getElementById('status-dot');
const recTimer = document.getElementById('rec-timer');
const canvas = document.getElementById('waveform-canvas');
const ctx = canvas.getContext('2d');
const successPreview = document.getElementById('success-preview');
const errorText = document.getElementById('error-text');

// --- Drag support ---
let mouseDownX = 0, mouseDownY = 0;
let hasDragged = false;

pill.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    mouseDownX = e.screenX;
    mouseDownY = e.screenY;
    hasDragged = false;
});

document.addEventListener('mousemove', (e) => {
    if (e.buttons !== 1) return;
    const dx = e.screenX - mouseDownX;
    const dy = e.screenY - mouseDownY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        hasDragged = true;
    }
});

function handleClick(e) {
    if (hasDragged) {
        hasDragged = false;
        return;
    }
    toggle();
}

// --- Expose toggle for hotkey ---
window.wisprToggle = toggle;

// --- State transitions ---
function setState(newState) {
    state = newState;
    pill.className = '';

    idleContent.style.display = 'none';
    listeningContent.style.display = 'none';
    processingContent.style.display = 'none';
    successContent.style.display = 'none';
    errorContent.style.display = 'none';

    switch (state) {
        case 'idle':
            idleContent.style.display = 'flex';
            resizeWindow(200, 48);
            break;
        case 'listening':
            pill.className = 'active';
            listeningContent.style.display = 'flex';
            resizeWindow(320, 56);
            setupCanvas();
            startWaveform();
            startLevelPolling();
            break;
        case 'processing':
            pill.className = 'processing';
            processingContent.style.display = 'flex';
            stopWaveform();
            stopLevelPolling();
            break;
        case 'success':
            pill.className = 'success';
            successContent.style.display = 'flex';
            break;
        case 'error':
            pill.className = 'error';
            errorContent.style.display = 'flex';
            break;
    }
}

function resizeWindow(w, h) {
    pill.style.width = w + 'px';
    pill.style.height = h + 'px';
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.resize_window(w, h);
    }
}

// --- Toggle recording ---
async function toggle() {
    if (state === 'idle') {
        await startRecording();
    } else if (state === 'listening') {
        await stopAndTranscribe();
    }
}

async function startRecording() {
    if (!window.pywebview || !window.pywebview.api) return;
    const ok = await window.pywebview.api.start_recording();
    if (ok) {
        audioLevelBuffer.fill(0);
        setState('listening');
    }
}

async function stopAndTranscribe() {
    if (state !== 'listening') return;
    setState('processing');

    const audioB64 = await window.pywebview.api.stop_recording();
    if (!audioB64) {
        showError('No audio captured');
        return;
    }

    const result = await window.pywebview.api.transcribe(audioB64);
    if (result.error) {
        showError(result.error);
    } else if (result.text) {
        await window.pywebview.api.paste_text(result.text);
        showSuccess(result.text);
    } else {
        showError('Empty transcription');
    }
}

function showSuccess(text) {
    const preview = text.length > 30 ? text.substring(0, 30) + '...' : text;
    successPreview.textContent = preview;
    setState('success');
    setTimeout(() => setState('idle'), 2000);
}

function showError(msg) {
    errorText.textContent = msg;
    setState('error');
    setTimeout(() => setState('idle'), 3000);
}

// --- Waveform ---
function setupCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = (rect.width - 80) * dpr;
    canvas.height = 56 * dpr;
    canvas.style.width = (rect.width - 80) + 'px';
    canvas.style.height = '56px';
    ctx.scale(dpr, dpr);
}

function startWaveform() {
    function draw() {
        if (state !== 'listening') return;

        const w = canvas.width / (window.devicePixelRatio || 1);
        const h = canvas.height / (window.devicePixelRatio || 1);
        ctx.clearRect(0, 0, w, h);

        // Draw smooth bezier waveform
        const points = audioLevelBuffer;
        const len = points.length;
        const stepX = w / (len - 1);
        const midY = h / 2;

        ctx.beginPath();
        ctx.moveTo(0, midY);

        for (let i = 0; i < len; i++) {
            const x = i * stepX;
            const amplitude = points[i] * (h * 0.4);
            const y = midY - amplitude;

            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                const prevX = (i - 1) * stepX;
                const prevY = midY - points[i - 1] * (h * 0.4);
                const cpX1 = prevX + stepX * 0.4;
                const cpX2 = x - stepX * 0.4;
                ctx.bezierCurveTo(cpX1, prevY, cpX2, y, x, y);
            }
        }

        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        // Mirror bottom half
        ctx.beginPath();
        ctx.moveTo(0, midY);

        for (let i = 0; i < len; i++) {
            const x = i * stepX;
            const amplitude = points[i] * (h * 0.4);
            const y = midY + amplitude;

            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                const prevX = (i - 1) * stepX;
                const prevY = midY + points[i - 1] * (h * 0.4);
                const cpX1 = prevX + stepX * 0.4;
                const cpX2 = x - stepX * 0.4;
                ctx.bezierCurveTo(cpX1, prevY, cpX2, y, x, y);
            }
        }

        ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Glow effect
        ctx.shadowColor = '#ef4444';
        ctx.shadowBlur = 6;
        ctx.shadowBlur = 0;

        animFrameId = requestAnimationFrame(draw);
    }

    animFrameId = requestAnimationFrame(draw);
}

function stopWaveform() {
    if (animFrameId) {
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
    }
}

// --- Level polling ---
function startLevelPolling() {
    async function poll() {
        if (state !== 'listening') return;
        if (!window.pywebview || !window.pywebview.api) return;

        try {
            const data = await window.pywebview.api.get_audio_level();

            // Shift buffer and add new level
            audioLevelBuffer.shift();
            audioLevelBuffer.push(data.level);

            // Update timer
            recTimer.textContent = Math.floor(data.duration) + 's';

            // Auto-stop on silence
            if (data.auto_stop) {
                await stopAndTranscribe();
                return;
            }
        } catch (e) {
            // ignore polling errors
        }

        levelPollId = setTimeout(poll, 16); // ~60fps
    }

    poll();
}

function stopLevelPolling() {
    if (levelPollId) {
        clearTimeout(levelPollId);
        levelPollId = null;
    }
}

// --- Health check ---
async function checkHealth() {
    if (!window.pywebview || !window.pywebview.api) {
        setTimeout(checkHealth, 1000);
        return;
    }
    try {
        const ok = await window.pywebview.api.check_health();
        statusDot.classList.toggle('connected', ok);
    } catch (e) {
        statusDot.classList.remove('connected');
    }
}

// --- Right-click context menu (prevent default) ---
document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});

// --- Init ---
window.addEventListener('load', () => {
    setState('idle');
    // Wait for pywebview bridge to be ready
    setTimeout(checkHealth, 500);
});

// Re-check health periodically
setInterval(checkHealth, 30000);
</script>
</body>
</html>
